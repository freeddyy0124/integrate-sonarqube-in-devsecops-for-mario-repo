name: "Build and push Super Mario Docker image with unique tag each time"

on:
  push:
    branches:
      - main

env:
  VERSION: $(( $(cat version.txt) + 1 ))
  
jobs:
  
  build_push_new_docker_image:
    runs-on: ubuntu-latest
    needs: sonarqube_sast_scan

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set Git Config
        run: |
          git config --global user.email "${{ secrets.GIT_EMAIL}}"
          git config --global user.name "${{ secrets.GIT_USERNAME}}"

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and Push Docker Image
        run: |
          git pull
          docker build -t docker.io/asecurityguru/mariomodified:${{ env.VERSION }} .
          docker push docker.io/asecurityguru/mariomodified:${{ env.VERSION }}
