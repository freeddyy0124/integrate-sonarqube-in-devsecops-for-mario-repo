name: "Build and push Super Mario Docker image with unique tag each time"

on:
  push:
    branches:
      - main

env:
  VERSION: $(( $(cat version.txt) + 1 ))
  
jobs:
  
  build_push_new_docker_image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and Push Docker Image
        run: |
          git pull
          docker build -t docker.io/freeddyy0124/supermariogitopsproject:${{ env.VERSION }} .
          docker push docker.io/freeddyy0124/supermariogitopsproject:${{ env.VERSION }}
