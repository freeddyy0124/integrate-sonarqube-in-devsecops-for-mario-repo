name: "Run SAST, Build and push supermario image, scan image, Update deployment and version files"

on:
  push:
    branches:
      - main

jobs:
  sonarqube_sast_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build_push_supermario_docker_image:
    runs-on: ubuntu-latest
    needs: sonarqube_sast_scan
    outputs:
      version: ${{ steps.set_version.outputs.version }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set VERSION from version.txt
        id: set_version
        run: |
          VERSION=$(( $(cat version.txt) + 1 ))
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using image tag: $VERSION"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: docker.io/freeddyy0124/supermariogitopsproject:${{ steps.set_version.outputs.version }}
          platforms: linux/amd64,linux/arm64

  run_container_image_scan_on_supermario_docker_image:
    runs-on: ubuntu-latest
    needs: build_push_supermario_docker_image

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get Docker Image from Docker Hub
        run: |
          docker pull docker.io/freeddyy0124/supermariogitopsproject:${{ needs.build_push_supermario_docker_image.outputs.version }}
          docker save -o "${{ github.workspace }}/supermariolatestdockerimage.tar" docker.io/freeddyy0124/supermariogitopsproject:${{ needs.build_push_supermario_docker_image.outputs.version }}
          ls -lh "${{ github.workspace }}"
          test -f "${{ github.workspace }}/supermariolatestdockerimage.tar"

      - name: Run Trivy vulnerability scanner in tarball mode
        uses: aquasecurity/trivy-action@0.28.0
        with:
          input: ${{ github.workspace }}/supermariolatestdockerimage.tar
          severity: CRITICAL,HIGH
          exit-code: '0'

  update_k8s_yaml_version_file_with_latest_image_tag:
    runs-on: ubuntu-latest
    needs:
      - build_push_supermario_docker_image
      - run_container_image_scan_on_supermario_docker_image

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Git Config
        run: |
          git config --global user.email "${{ secrets.GIT_EMAIL }}"
          git config --global user.name "${{ secrets.GIT_USERNAME }}"

      - name: Pull latest changes
        run: git pull origin main --rebase

      - name: Update Deployment YAML and version.txt
        run: |
          VERSION=${{ needs.build_push_supermario_docker_image.outputs.version }}
          sed -i "s|image: freeddyy0124/supermariogitopsproject:.*$|image: freeddyy0124/supermariogitopsproject:${VERSION}|" deployment.yaml
          echo "${VERSION}" > version.txt
          git add deployment.yaml version.txt
          git commit -m "Updated deployment yaml and version txt file with supermario image tag to ${VERSION}" || echo "No changes to commit"
          git push origin main