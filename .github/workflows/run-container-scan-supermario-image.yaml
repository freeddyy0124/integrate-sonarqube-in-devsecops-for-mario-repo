name: "Run Container Scan on Super Mario Docker Image"

on:
  push:
    branches:
      - main

jobs:
  run_container_image_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Read Version
        run: |
          echo "VERSION=$(cat version.txt)" >> $GITHUB_ENV

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Pull Docker Image
        run: |
          docker pull docker.io/raghuthesecurityexpert/supermariogitopsproject:${VERSION}

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: docker.io/raghuthesecurityexpert/supermariogitopsproject:${{ env.VERSION }}
          severity: CRITICAL,HIGH
          exit-code: '0'